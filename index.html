<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-Elite Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. PREMIUM RESET & MASTER TYPOGRAPHY
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #001329; /* Deep luxury navy base background */
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.3px;
        }

        /* ==========================================
           2. EXECUTIVE ULTRA-SLIM NAVIGATION
           ========================================== */
        header {
            background-color: rgba(0, 19, 41, 0.85); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: #FFFFFF !important;
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            font-family: 'Inter', sans-serif;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            margin-right: 45px;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase; 
            letter-spacing: 2px;     
            position: relative;
            padding: 6px 0;
            transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #D4AF37; 
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav a:hover {
            color: #FFFFFF;
        }

        nav a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Minimalist Language Switcher Styling */
        .lang-switcher {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            padding-left: 25px;
        }

        .lang-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 4px 2px;
            transition: color 0.3s ease;
            font-weight: 600;
        }

        .lang-btn.active {
            color: #D4AF37;
        }

        .lang-btn:hover {
            color: #FFFFFF;
        }

        .lang-divider {
            color: rgba(255, 255, 255, 0.2);
